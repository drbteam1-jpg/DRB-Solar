<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRB오토모티브 태양광 발전 대시보드</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:#111827; color:#e2e8f0; min-height:100vh; }

  /* ── Header ── */
  .header { background:linear-gradient(135deg,#1e293b 0%,#111827 100%); padding:20px 32px; border-bottom:1px solid #334155; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-icon { font-size:2.2rem; }
  .header-left h1 { font-size:1.4rem; font-weight:700; color:#f1f5f9; }
  .header-left p  { font-size:0.8rem; color:#94a3b8; margin-top:3px; }
  .header-right { font-size:0.78rem; color:#64748b; }

  /* ── Filter bar ── */
  .filter-bar { background:#1e293b; padding:12px 32px; border-bottom:1px solid #334155; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .filter-divider { width:1px; height:28px; background:#334155; flex-shrink:0; }
  .filter-label { font-size:0.72rem; color:#94a3b8; font-weight:600; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }

  /* Date inputs */
  .date-group { display:flex; align-items:center; gap:7px; }
  .date-input { background:#293548; border:1px solid #475569; border-radius:6px; color:#e2e8f0; padding:7px 11px; font-size:0.82rem; width:126px; cursor:pointer; outline:none; }
  .date-input:focus { border-color:#38bdf8; }
  .date-sep { color:#64748b; }
  .btn { padding:7px 15px; border-radius:6px; border:none; cursor:pointer; font-size:0.8rem; font-weight:600; transition:all .15s; font-family:inherit; }
  .btn-primary   { background:#0ea5e9; color:#fff; }
  .btn-primary:hover { background:#0284c7; }
  .btn-secondary { background:#293548; border:1px solid #475569; color:#94a3b8; }
  .btn-secondary:hover { background:#344562; }

  /* Quick date buttons */
  .quick-btns { display:flex; gap:5px; }
  .quick-btn { padding:6px 11px; border-radius:20px; border:1px solid #475569; background:#293548; color:#94a3b8; font-size:0.73rem; cursor:pointer; transition:all .15s; white-space:nowrap; font-family:inherit; }
  .quick-btn:hover { background:#344562; color:#e2e8f0; }
  .quick-btn.active { background:#0ea5e9; border-color:#0ea5e9; color:#fff; }

  /* ── Granularity segment control ── */
  .gran-seg { display:flex; background:#1a2535; border:1px solid #475569; border-radius:8px; overflow:hidden; }
  .gran-btn { padding:7px 20px; border:none; background:transparent; color:#94a3b8; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all .15s; font-family:inherit; white-space:nowrap; position:relative; }
  .gran-btn + .gran-btn { border-left:1px solid #475569; }
  .gran-btn:hover { color:#e2e8f0; background:#283548; }
  .gran-btn.active { background:#0ea5e9; color:#fff; border-color:#0ea5e9; box-shadow:inset 0 1px 4px rgba(0,0,0,.25); }
  .gran-btn.active + .gran-btn { border-left-color:#0ea5e9; }

  /* ── KPI row ── */
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:20px 32px 0; }
  .kpi-card { background:#1e293b; border:1px solid #334155; border-radius:10px; padding:16px 18px; position:relative; overflow:hidden; }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:10px 10px 0 0; }
  .kpi-green::before  { background:linear-gradient(90deg,#10b981,#34d399); }
  .kpi-blue::before   { background:linear-gradient(90deg,#2dd4bf,#5eead4); }
  .kpi-orange::before { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
  .kpi-purple::before { background:linear-gradient(90deg,#8b5cf6,#a78bfa); }
  .kpi-label { font-size:0.82rem; color:#94a3b8; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  .kpi-value { font-size:1.9rem; font-weight:700; color:#f1f5f9; line-height:1; }
  .kpi-unit  { font-size:0.88rem; color:#94a3b8; margin-left:4px; font-weight:400; }
  .kpi-sub   { font-size:0.8rem; color:#64748b; margin-top:6px; }

  /* ── Charts grid ── */
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:16px 32px 32px; }
  .chart-card { background:#1e293b; border:1px solid #334155; border-radius:10px; overflow:hidden; }
  .chart-header { padding:14px 18px 10px; border-bottom:1px solid #2d3f52; }
  .chart-header h3 { font-size:1rem; font-weight:700; color:#e2e8f0; }
  .chart-header p  { font-size:0.8rem; color:#64748b; margin-top:4px; }
  .chart-body { height:300px; padding:4px; }
  .no-data { display:flex; align-items:center; justify-content:center; height:100%; color:#64748b; font-size:.85rem; }

  /* ── Responsive ── */
  @media (max-width:1000px) { .charts-grid { grid-template-columns:1fr; } .kpi-row { grid-template-columns:repeat(2,1fr); } }
  @media (max-width:600px)  { .kpi-row { grid-template-columns:1fr; } .filter-bar { flex-direction:column; align-items:flex-start; } .header { flex-direction:column; } }

  /* ── Flatpickr ── */
  .flatpickr-calendar { background:#293548 !important; border:1px solid #475569 !important; box-shadow:0 8px 32px rgba(0,0,0,.5) !important; }
  .flatpickr-day { color:#cbd5e1 !important; border-radius:4px !important; }
  .flatpickr-day:hover { background:#344562 !important; }
  .flatpickr-day.selected,.flatpickr-day.startRange,.flatpickr-day.endRange { background:#0ea5e9 !important; border-color:#0ea5e9 !important; color:#fff !important; }
  .flatpickr-day.inRange { background:#1a4060 !important; border-color:transparent !important; box-shadow:none !important; }
  .flatpickr-month,.flatpickr-weekdays { background:#293548 !important; }
  .flatpickr-weekday { color:#94a3b8 !important; }
  .flatpickr-current-month { color:#cbd5e1 !important; }
  .flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month { color:#cbd5e1 !important; fill:#cbd5e1 !important; }
  .numInputWrapper input { color:#cbd5e1 !important; }
  .flatpickr-monthDropdown-months { color:#cbd5e1 !important; background:#293548 !important; }
  span.arrowUp:after,span.arrowDown:after { border-bottom-color:#94a3b8 !important; border-top-color:#94a3b8 !important; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">&#9728;&#65039;</div>
    <div>
      <h1>DRB오토모티브 태양광 발전 대시보드</h1>
      <p>발전량 일별 Trend &nbsp;·&nbsp; 주차별 태양광 사용비율</p>
    </div>
  </div>
  <div class="header-right">데이터 기간: 2024.06.29 ~ 2026.06.30</div>
</div>

<!-- ── Filter bar ── -->
<div class="filter-bar">

  <!-- 기간 설정 -->
  <span class="filter-label">&#128197; 기간 설정</span>
  <div class="date-group">
    <input type="text" id="dateFrom" class="date-input" placeholder="시작일" readonly>
    <span class="date-sep">~</span>
    <input type="text" id="dateTo"   class="date-input" placeholder="종료일" readonly>
    <button class="btn btn-primary"   onclick="applyFilter()">적용</button>
    <button class="btn btn-secondary" onclick="resetFilter()">전체 기간</button>
  </div>
  <div class="quick-btns">
    <button class="quick-btn" id="q3"   onclick="setQuick(3,this)">최근 3개월</button>
    <button class="quick-btn" id="q6"   onclick="setQuick(6,this)">최근 6개월</button>
    <button class="quick-btn" id="q12"  onclick="setQuick(12,this)">최근 1년</button>
    <button class="quick-btn active" id="qAll" onclick="setQuick(0,this)">전체</button>
  </div>

  <div class="filter-divider"></div>

  <!-- 기간 단위 -->
  <span class="filter-label">&#128280; 기간 단위</span>
  <div class="gran-seg">
    <button class="gran-btn" id="gD" onclick="setGran('daily',this)">일간</button>
    <button class="gran-btn active" id="gW" onclick="setGran('weekly',this)">주간</button>
    <button class="gran-btn" id="gM" onclick="setGran('monthly',this)">월간</button>
  </div>

</div>

<!-- ── KPI cards ── -->
<div class="kpi-row">
  <div class="kpi-card kpi-green">
    <div class="kpi-label">&#9889; 총 태양광 발전량</div>
    <div class="kpi-value" id="kpiTotalGen">-<span class="kpi-unit">MWh</span></div>
    <div class="kpi-sub"   id="kpiTotalGenSub"></div>
  </div>
  <div class="kpi-card kpi-blue">
    <div class="kpi-label">&#128202; 평균 일일 발전량</div>
    <div class="kpi-value" id="kpiAvgDaily">-<span class="kpi-unit">kWh</span></div>
    <div class="kpi-sub"   id="kpiDays"></div>
  </div>
  <div class="kpi-card kpi-orange">
    <div class="kpi-label">&#128338; 평균 발전시간</div>
    <div class="kpi-value" id="kpiAvgHours">-<span class="kpi-unit">h</span></div>
    <div class="kpi-sub">목표: 3.5시간 / 일</div>
  </div>
  <div class="kpi-card kpi-purple">
    <div class="kpi-label">&#127928; 태양광 사용비율</div>
    <div class="kpi-value" id="kpiAvgRatio">-<span class="kpi-unit">%</span></div>
    <div class="kpi-sub"   id="kpiRatioSub"></div>
  </div>
</div>

<!-- ── Charts 2x2 ── -->
<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-header">
      <h3 id="h1title">&#128200; 태양광 발전량 Trend</h3>
      <p  id="h1sub"></p>
    </div>
    <div class="chart-body"><div id="chart1" style="height:100%;"></div></div>
  </div>
  <div class="chart-card">
    <div class="chart-header">
      <h3 id="h2title">&#9201; 평균 발전시간</h3>
      <p  id="h2sub"></p>
    </div>
    <div class="chart-body"><div id="chart2" style="height:100%;"></div></div>
  </div>
  <div class="chart-card">
    <div class="chart-header">
      <h3 id="h3title">&#128268; 전력사용량 vs 태양광 발전량</h3>
      <p  id="h3sub"></p>
    </div>
    <div class="chart-body"><div id="chart3" style="height:100%;"></div></div>
  </div>
  <div class="chart-card">
    <div class="chart-header">
      <h3 id="h4title">&#127775; 태양광 사용비율</h3>
      <p  id="h4sub"></p>
    </div>
    <div class="chart-body"><div id="chart4" style="height:100%;"></div></div>
  </div>
</div>

// ── Plotly base ─────────────────────────────────────────────────
const CFG = {responsive:true, displayModeBar:false};
const LAY = (extra) => Object.assign({
  paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
  margin:{t:10,r:12,b:44,l:62},
  font:{family:'Malgun Gothic,Apple SD Gothic Neo,sans-serif',color:'#94a3b8',size:12},
  xaxis:{gridcolor:'#2d3f52',zerolinecolor:'#2d3f52',tickfont:{size:11}},
  yaxis:{gridcolor:'#2d3f52',zerolinecolor:'#2d3f52',tickfont:{size:11}},
  legend:{bgcolor:'rgba(0,0,0,0)',font:{size:11},orientation:'h',y:-0.18},
  hoverlabel:{bgcolor:'#293548',bordercolor:'#475569',font:{color:'#e2e8f0',size:13}}
}, extra);

// ── State ───────────────────────────────────────────────────────
let fromDate    = null;
let toDate      = null;
let granularity = 'weekly'; // 'daily' | 'weekly' | 'monthly'

// ── Granularity config ──────────────────────────────────────────
// Each entry maps granularity → which RAW arrays and field names to use
const GRAN = {
  daily: {
    label:'일간', xKey:'date',
    genArr:'daily',       usageArr:'usage',
    kwhField:'daily_kwh', hoursField:'gen_hours',
    bargap:0.15
  },
  weekly: {
    label:'주간', xKey:'week_start',
    genArr:'weekly_gen',  usageArr:'weekly_usage',
    kwhField:'total_kwh', hoursField:'avg_hours',
    bargap:0.2
  },
  monthly: {
    label:'월간', xKey:'month',
    genArr:'monthly_gen', usageArr:'monthly_usage',
    kwhField:'total_kwh', hoursField:'avg_hours',
    bargap:0.35
  }
};

const kwhUnit = (gran) => gran === 'daily' ? 'kWh' : 'MWh';
const toUnit  = (val, gran) => gran === 'daily' ? val : val / 1000;
const fmt     = (n, d=0) => n == null ? '-' : n.toLocaleString('ko-KR', {minimumFractionDigits:d,maximumFractionDigits:d});

// ── Filter helpers ──────────────────────────────────────────────
function filterByX(arr, xKey) {
  return arr.filter(d => {
    const x = d[xKey];
    return (!fromDate || x >= fromDate) && (!toDate || x <= toDate);
  });
}

function getDatasets() {
  const g = GRAN[granularity];
  return {
    g,
    gen:   filterByX(RAW[g.genArr],   g.xKey),
    usage: filterByX(RAW[g.usageArr], g.xKey)
  };
}

// ── KPI — always based on raw daily data (date-filtered only) ───
function updateKPIs() {
  const daily  = filterByX(RAW.daily, 'date');
  const usage  = filterByX(RAW.usage, 'date');
  const totalGen   = daily.reduce((s,d) => s + d.daily_kwh, 0);
  const avgDaily   = daily.length ? totalGen / daily.length : 0;
  const avgHrs     = daily.length ? daily.reduce((s,d) => s + d.gen_hours, 0) / daily.length : 0;
  const totalUsage = usage.reduce((s,d) => s + d.total_usage, 0);
  const totalSolar = usage.reduce((s,d) => s + d.total_solar, 0);
  const totalRatio = totalUsage > 0 ? totalSolar / totalUsage * 100 : 0;
  const avgRatio   = usage.length  ? usage.reduce((s,d) => s + d.solar_ratio, 0) / usage.length : 0;

  document.getElementById('kpiTotalGen').innerHTML    = fmt(totalGen/1000,1)+'<span class="kpi-unit">MWh</span>';
  document.getElementById('kpiTotalGenSub').textContent = fmt(totalGen,0)+' kWh · '+daily.length+'일 합계';
  document.getElementById('kpiAvgDaily').innerHTML    = fmt(avgDaily,0)+'<span class="kpi-unit">kWh</span>';
  document.getElementById('kpiDays').textContent      = daily.length+'일 평균';
  document.getElementById('kpiAvgHours').innerHTML    = avgHrs.toFixed(2)+'<span class="kpi-unit">h</span>';
  document.getElementById('kpiAvgRatio').innerHTML    = totalRatio.toFixed(1)+'<span class="kpi-unit">%</span>';
  document.getElementById('kpiRatioSub').textContent  = '일 평균: '+avgRatio.toFixed(1)+'%';
}

// ── Chart headers ───────────────────────────────────────────────
function updateHeaders(label, gran) {
  const u = kwhUnit(gran);
  document.getElementById('h1title').innerHTML = '&#128200; '+label+' 태양광 발전량 Trend';
  document.getElementById('h1sub').textContent = '발전량 일별 Trend · '+label+' 발전량 ('+u+')';
  document.getElementById('h2title').innerHTML = '&#9201; '+label+' 평균 발전시간';
  document.getElementById('h2sub').textContent = '발전량 일별 Trend · '+label+' 평균 발전시간 (h) · 목표 3.5h 기준선';
  document.getElementById('h3title').innerHTML = '&#128268; '+label+' 전력사용량 vs 태양광 발전량';
  document.getElementById('h3sub').textContent = '주차별 태양광 사용비율 · '+label+' 전력사용량 및 태양광 발전량 비교 ('+u+')';
  document.getElementById('h4title').innerHTML = '&#127775; '+label+' 태양광 사용비율';
  document.getElementById('h4sub').textContent = '주차별 태양광 사용비율 · '+label+' 태양광 발전량 / 전력사용량 (%)';
}

// ── Chart 1: 발전량 Trend ───────────────────────────────────────
function drawChart1(gen, g) {
  if (!gen.length) { document.getElementById('chart1').innerHTML='<div class="no-data">데이터 없음</div>'; return; }
  const xs   = gen.map(d => d[g.xKey]);
  const raws = gen.map(d => d[g.kwhField]);
  const ys   = raws.map(v => +toUnit(v, granularity).toFixed(2));
  const unit = kwhUnit(granularity);
  const maxY = Math.max(...ys);

  const barTrace1 = {
    x:xs, y:ys, type:'bar', name:g.label+' 발전량',
    marker:{ color:'#2dd4bf' },
    hovertemplate:'<b>%{x}</b><br>발전량: %{y:,.1f} '+unit+'<extra></extra>'
  };
  if (granularity === 'monthly') {
    barTrace1.text         = ys.map(v => fmt(v,1));
    barTrace1.textposition = 'outside';
    barTrace1.textfont     = {color:'#cbd5e1', size:12};
    barTrace1.cliponaxis   = false;
  }
  const traces = [barTrace1];

  // Daily only: overlay monthly average line
  if (granularity === 'daily') {
    const mMap = {};
    gen.forEach(d => { const m=d.date.slice(0,7); (mMap[m]=mMap[m]||[]).push(d.daily_kwh); });
    traces.push({
      x:xs,
      y:xs.map(x => { const a=mMap[x.slice(0,7)]||[]; return a.length ? a.reduce((p,q)=>p+q)/a.length : null; }),
      type:'scatter', mode:'lines', name:'월 평균',
      line:{color:'#fbbf24', width:2, dash:'dot'},
      hovertemplate:'<b>%{x}</b><br>월 평균: %{y:,.0f} kWh<extra></extra>'
    });
  }

  Plotly.newPlot('chart1', traces, LAY({
    yaxis:{title:{text:unit,font:{size:11}},gridcolor:'#2d3f52',zerolinecolor:'#2d3f52'},
    bargap:g.bargap
  }), CFG);
}

// ── Chart 2: 평균 발전시간 ──────────────────────────────────────
function drawChart2(gen, g) {
  if (!gen.length) { document.getElementById('chart2').innerHTML='<div class="no-data">데이터 없음</div>'; return; }
  const xs  = gen.map(d => d[g.xKey]);
  const hrs = gen.map(d => d[g.hoursField]);

  const targetLine = {
    x:[xs[0],xs[xs.length-1]], y:[3.5,3.5],
    type:'scatter', mode:'lines', name:'목표 3.5h',
    line:{color:'#f59e0b',width:1.5,dash:'dash'},
    hoverinfo:'skip'
  };

  let traces;
  if (granularity === 'daily') {
    // area + 30-day centred moving average
    const ma = hrs.map((_,i) => {
      const sl = hrs.slice(Math.max(0,i-14), i+15);
      return sl.reduce((a,b)=>a+b,0)/sl.length;
    });
    traces = [
      { x:xs, y:hrs, type:'scatter', mode:'lines', name:'일별 발전시간',
        fill:'tozeroy', fillcolor:'rgba(45,212,191,0.1)',
        line:{color:'#2dd4bf',width:1},
        hovertemplate:'<b>%{x}</b><br>발전시간: %{y:.2f} h<extra></extra>' },
      { x:xs, y:ma,  type:'scatter', mode:'lines', name:'30일 이동평균',
        line:{color:'#10b981',width:2},
        hovertemplate:'<b>%{x}</b><br>이동평균: %{y:.2f} h<extra></extra>' },
      targetLine
    ];
  } else {
    // Weekly/Monthly: colour-coded bar (green ≥ 3.5h, blue < 3.5h)
    const barTrace2 = {
      x:xs, y:hrs, type:'bar', name:g.label+' 평균 발전시간',
      marker:{color:'#2dd4bf'},
      hovertemplate:'<b>%{x}</b><br>발전시간: %{y:.2f} h<extra></extra>'
    };
    if (granularity === 'monthly') {
      barTrace2.text         = hrs.map(v => v.toFixed(2)+'h');
      barTrace2.textposition = 'outside';
      barTrace2.textfont     = {color:'#cbd5e1', size:12};
      barTrace2.cliponaxis   = false;
    }
    traces = [barTrace2, targetLine];
  }

  Plotly.newPlot('chart2', traces, LAY({
    yaxis:{title:{text:'시간 (h)',font:{size:11}},gridcolor:'#2d3f52',zerolinecolor:'#2d3f52'},
    bargap:g.bargap
  }), CFG);
}

// ── Chart 3: 전력사용량 vs 태양광 발전량 ────────────────────────
function drawChart3(usage, g) {
  if (!usage.length) { document.getElementById('chart3').innerHTML='<div class="no-data">데이터 없음</div>'; return; }
  const xs   = usage.map(d => d[g.xKey]);
  const unit = kwhUnit(granularity);
  const usagY  = usage.map(d => +toUnit(d.total_usage, granularity).toFixed(2));
  const solarY = usage.map(d => +toUnit(d.total_solar, granularity).toFixed(2));

  const trUsage = {
    x:xs, y:usagY, type:'bar', name:'전력사용량',
    marker:{color:'#475569', opacity:0.9},
    hovertemplate:'<b>%{x}</b><br>전력사용량: %{y:,.1f} '+unit+'<extra></extra>'
  };
  const trSolar = {
    x:xs, y:solarY, type:'bar', name:'태양광 발전량',
    marker:{color:'#f59e0b'},
    hovertemplate:'<b>%{x}</b><br>태양광 발전량: %{y:,.1f} '+unit+'<extra></extra>'
  };
  if (granularity === 'monthly') {
    trUsage.text         = usagY.map(v => fmt(v,1));
    trUsage.textposition = 'outside';
    trUsage.textfont     = {color:'#94a3b8', size:11};
    trUsage.cliponaxis   = false;
    trSolar.text         = solarY.map(v => fmt(v,1));
    trSolar.textposition = 'inside';
    trSolar.textfont     = {color:'#fff', size:11};
  }
  Plotly.newPlot('chart3', [trUsage, trSolar], LAY({
    barmode:'overlay',
    yaxis:{title:{text:unit,font:{size:11}},gridcolor:'#2d3f52',zerolinecolor:'#2d3f52'},
    bargap:g.bargap
  }), CFG);
}

// ── Chart 4: 태양광 사용비율 ────────────────────────────────────
function drawChart4(usage, g) {
  if (!usage.length) { document.getElementById('chart4').innerHTML='<div class="no-data">데이터 없음</div>'; return; }
  const xs     = usage.map(d => d[g.xKey]);
  const ratios = usage.map(d => d.solar_ratio);
  const avg    = ratios.reduce((a,b)=>a+b,0) / ratios.length;

  const modeByGran = { daily:'lines', weekly:'lines+markers', monthly:'lines+markers' };
  const markerSz   = { daily:0, weekly:4, monthly:6 };

  Plotly.newPlot('chart4', [
    { x:xs, y:ratios, type:'scatter', mode:modeByGran[granularity],
      name:'태양광 사용비율',
      fill:'tozeroy', fillcolor:'rgba(245,158,11,0.08)',
      line:{color:'#f59e0b', width:granularity==='daily'?1:2},
      marker:{size:markerSz[granularity], color:'#f59e0b'},
      hovertemplate:'<b>%{x}</b><br>사용비율: %{y:.1f}%<extra></extra>' },
    { x:[xs[0],xs[xs.length-1]], y:[avg,avg],
      type:'scatter', mode:'lines', name:'평균 '+avg.toFixed(1)+'%',
      line:{color:'#10b981',width:1.5,dash:'dash'},
      hoverinfo:'skip' }
  ], LAY({
    yaxis:{title:{text:'비율 (%)',font:{size:11}},gridcolor:'#2d3f52',zerolinecolor:'#2d3f52',
           range:[0,Math.max(...ratios)*1.2]}
  }), CFG);
}

// ── Main render ─────────────────────────────────────────────────
function renderAll() {
  const {g, gen, usage} = getDatasets();
  updateKPIs();
  updateHeaders(g.label, granularity);
  drawChart1(gen,   g);
  drawChart2(gen,   g);
  drawChart3(usage, g);
  drawChart4(usage, g);
}

// ── Granularity toggle ──────────────────────────────────────────
function setGran(gran, btn) {
  granularity = gran;
  document.querySelectorAll('.gran-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── Date filter ─────────────────────────────────────────────────
function applyFilter() {
  fromDate = document.getElementById('dateFrom').value || null;
  toDate   = document.getElementById('dateTo').value   || null;
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  renderAll();
}
function resetFilter() {
  fromDate = null; toDate = null;
  fpFrom.clear(); fpTo.clear();
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('qAll').classList.add('active');
  renderAll();
}
function setQuick(months, btn) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (months === 0) {
    fromDate = null; toDate = null;
    fpFrom.clear(); fpTo.clear();
  } else {
    const end   = new Date('2026-06-30');
    const start = new Date(end);
    start.setMonth(start.getMonth() - months);
    fromDate = start.toISOString().slice(0,10);
    toDate   = end.toISOString().slice(0,10);
    fpFrom.setDate(fromDate);
    fpTo.setDate(toDate);
  }
  renderAll();
}

// ── Flatpickr ───────────────────────────────────────────────────
const fpFrom = flatpickr('#dateFrom', {
  dateFormat:'Y-m-d', locale:'ko',
  minDate:'2024-06-29', maxDate:'2026-06-30',
  onChange:(_,ds) => { fromDate = ds || null; }
});
const fpTo = flatpickr('#dateTo', {
  dateFormat:'Y-m-d', locale:'ko',
  minDate:'2024-06-29', maxDate:'2026-06-30',
  onChange:(_,ds) => { toDate = ds || null; }
});

// ── Boot ────────────────────────────────────────────────────────
renderAll();
window.addEventListener('resize', () => {
  ['chart1','chart2','chart3','chart4'].forEach(id => { try { Plotly.relayout(id, {}); } catch(e){} });
});
</script>
